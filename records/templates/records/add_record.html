{% extends 'records/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto px-2">
    <a href="/" class="text-sm text-slate-500">← Back</a>

    <div class="bg-white rounded-2xl shadow border mt-4 mx-1 sm:mx-0">
        <div class="px-4 sm:px-8 py-5 border-b">
            <h2 class="text-lg sm:text-xl font-bold">New Bill Record</h2>
        </div>

        <form method="POST" class="p-4 sm:p-8 space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="text-sm font-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-xs text-red-500">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">
                Save Record
            </button>
        </form>
    </div>
</div>
{% endblock %}

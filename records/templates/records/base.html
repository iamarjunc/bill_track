
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiswarya Offset Printers | Bill Tracker</title>
    <link rel="icon" href="https://raw.githubusercontent.com/iamarjunc/bill_track/refs/heads/master/public/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen overflow-x-hidden">

<nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-3 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/iamarjunc/bill_track/refs/heads/master/public/logo.jpg" class="w-10 h-10 rounded-lg object-cover">

                <div>
                    <span class="text-lg font-extrabold">Aiswarya</span>
                    <div class="text-[10px] text-indigo-600 font-bold">Offset Printers</div>
                </div>
            </div>

            <div class="flex items-center gap-3 sm:gap-6">
                <a href="/" class="text-xs sm:text-sm font-semibold text-slate-600 hover:text-indigo-600">
                    Dashboard
                </a>
                <a href="/add/" class="bg-indigo-600 text-white px-3 sm:px-5 py-2 rounded-lg sm:rounded-xl text-xs sm:text-sm font-bold">
                    + Add
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-3 sm:px-4 py-6 sm:py-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
